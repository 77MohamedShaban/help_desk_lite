name: help_desk_lite
description: "A production-ready internal support ticketing system."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^9.0.0
  
  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0
  
  # Navigation
  go_router: ^14.7.2
  
  # Firebase
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.3
  firebase_messaging:
  
  # Functional / Utilities
  equatable: ^2.0.7
  uuid: ^4.5.1
  intl: ^0.20.2
  json_annotation: ^4.9.0
  logger: ^2.5.0
  
  # UI
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Code Generation
  build_runner: ^2.4.15
  injectable_generator: ^2.6.2
  json_serializable: ^6.9.3

  # Splash Screen & Icons
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/splash_logo.png"
  android_12:
    image: "assets/images/splash_logo.png"
    color: "#FFFFFF"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
